<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noto Sans Feature Specimen</title>
    <style>
      @font-face {
        font-family: "Noto Sans Specimen";
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url("/fonts/noto-sans/NotoSans-Variable.ttf") format("truetype");
      }

      :root {
        --bg: #f6f2e8;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-strong: #fffdf8;
        --text: #1d1d1b;
        --muted: #635f57;
        --border: rgba(29, 29, 27, 0.14);
        --accent: #b55d31;
        --shadow: 0 16px 40px rgba(65, 48, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans Specimen", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(233, 198, 133, 0.34), transparent 32%),
          radial-gradient(circle at top right, rgba(192, 214, 210, 0.44), transparent 30%),
          linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      }

      main {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .hero {
        margin-bottom: 28px;
        padding: 24px;
        border: 1px solid var(--border);
        background: linear-gradient(135deg, rgba(255, 253, 248, 0.96), rgba(247, 241, 230, 0.9));
        box-shadow: var(--shadow);
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero p,
      .panel-note,
      .feature-meta {
        margin: 0;
        color: var(--muted);
      }

      .hero p {
        max-width: 70ch;
        font-size: 15px;
        line-height: 1.5;
      }

      .hero strong {
        color: var(--accent);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin: 18px 0 0;
      }

      .control {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.64);
      }

      .control label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .control input,
      .control textarea {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      .control textarea {
        min-height: 90px;
        resize: vertical;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 14px;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .card-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .card h2 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
      }

      .tag {
        flex: 0 0 auto;
        padding: 4px 8px;
        border: 1px solid rgba(181, 93, 49, 0.25);
        color: var(--accent);
        background: rgba(181, 93, 49, 0.08);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .specimen {
        display: grid;
        gap: 10px;
      }

      .sample {
        padding: 14px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
      }

      .sample-label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .sample-line {
        font-size: var(--sample-size, 34px);
        line-height: 1.18;
        letter-spacing: var(--sample-tracking, 0em);
        word-break: break-word;
      }

      .sample-line[data-features] {
        font-feature-settings: var(--sample-features, normal);
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      .stack .sample-line {
        font-size: calc(var(--sample-size, 34px) * 0.72);
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 1280px);
          padding-top: 20px;
        }

        .hero,
        .card {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Noto Sans Feature Specimen</h1>
        <p>
          This page uses the same self-hosted variable font file as the app.
          The important detail for your original issue is that the alternate
          capital <strong>J</strong> is exposed through <code>ss04</code> and
          <code>salt</code>, not <code>ss01</code>.
        </p>
        <div class="controls">
          <div class="control">
            <label for="sample-size">Sample size</label>
            <input id="sample-size" type="range" min="18" max="72" value="34" />
          </div>
          <div class="control">
            <label for="tracking">Tracking</label>
            <input id="tracking" type="range" min="-40" max="120" value="0" />
          </div>
          <div class="control">
            <label for="sample-text">Shared text</label>
            <textarea id="sample-text">I J IJ JAZZ JACKPOT
0123456789 00O0 11I1
The quick brown fox jumps over 13 lazy dogs.</textarea>
          </div>
        </div>
      </section>

      <section class="grid" id="feature-grid"></section>
    </main>

    <script>
      const featureCards = [
        {
          title: "Default",
          tag: "normal",
          note: "Baseline rendering with no explicit OpenType feature switches.",
          features: "normal",
        },
        {
          title: "Stylistic Alternates",
          tag: "salt",
          note: "General alternates. This includes the alternate capital J and I.",
          features: '"salt" on',
        },
        {
          title: "Stylistic Set 03",
          tag: "ss03",
          note: "Implemented by the font, though subtle for Latin text.",
          features: '"ss03" on',
        },
        {
          title: "Stylistic Set 04",
          tag: "ss04",
          note: "The relevant set for the alternate capital J in this font.",
          features: '"ss04" on',
        },
        {
          title: "Stylistic Set 06",
          tag: "ss06",
          note: "Present in the font; compare directly against the default sample.",
          features: '"ss06" on',
        },
        {
          title: "Stylistic Set 07",
          tag: "ss07",
          note: "Present in the font; compare directly against the default sample.",
          features: '"ss07" on',
        },
        {
          title: "Small Caps",
          tag: "smcp",
          note: "Lowercase letters become small caps.",
          features: '"smcp" on',
          text: "small caps for labels and ui copy",
        },
        {
          title: "Caps To Small Caps",
          tag: "c2sc",
          note: "Uppercase letters become small caps.",
          features: '"c2sc" on',
          text: "ALL CAPS TURN INTO SMALL CAPS",
        },
        {
          title: "Slashed Zero",
          tag: "zero",
          note: "Useful when you want 0 and O to separate cleanly.",
          features: '"zero" on',
          text: "0 O 00O0 1008 2026 9000",
        },
        {
          title: "Lining Figures",
          tag: "lnum",
          note: "Uniform-height numerals for tables and UI.",
          features: '"lnum" on',
          text: "0123456789 314159 20240630",
        },
        {
          title: "Oldstyle Figures",
          tag: "onum",
          note: "Text figures with ascenders and descenders.",
          features: '"onum" on',
          text: "0123456789 314159 20240630",
        },
        {
          title: "Proportional Figures",
          tag: "pnum",
          note: "Numbers use natural character widths.",
          features: '"pnum" on',
          text: "1111 1234 8888 9090 7001",
        },
        {
          title: "Tabular Figures",
          tag: "tnum",
          note: "Numbers are forced to equal widths.",
          features: '"tnum" on',
          text: "1111 1234 8888 9090 7001",
        },
        {
          title: "Fractions",
          tag: "frac",
          note: "Converts common slash-based fractions.",
          features: '"frac" on',
          text: "1/2 1/3 2/3 3/4 7/8 12/16",
        },
        {
          title: "Subscripts",
          tag: "subs",
          note: "Useful for formulas and notation.",
          features: '"subs" on',
          text: "H2O CO2 x2 a1 b12 c345",
        },
        {
          title: "Superscripts",
          tag: "sups",
          note: "Useful for notes, exponents, and inline markers.",
          features: '"sups" on',
          text: "x2 y12 E=mc2 n123",
        },
        {
          title: "Scientific Inferiors",
          tag: "sinf",
          note: "Subscript-like inferiors intended for scientific notation.",
          features: '"sinf" on',
          text: "H2SO4 Na2CO3 log10 a123",
        },
        {
          title: "Ordinals",
          tag: "ordn",
          note: "Turns ordinal suffixes into ordinal forms.",
          features: '"ordn" on',
          text: "1st 2nd 3rd 4th 21st 32nd 43rd",
        },
        {
          title: "Case-Sensitive Forms",
          tag: "case",
          note: "Adjusts punctuation for all-caps settings.",
          features: '"case" on',
          text: "(HELLO) [WORLD] {QUERY} - /",
        },
        {
          title: "Ligatures",
          tag: "liga",
          note: "Standard ligatures where available.",
          features: '"liga" on',
          text: "office affine shuffle cliff flag",
        },
      ];

      const grid = document.getElementById("feature-grid");
      const sampleSizeInput = document.getElementById("sample-size");
      const trackingInput = document.getElementById("tracking");
      const sampleTextInput = document.getElementById("sample-text");

      function createSampleLine(text, features) {
        const line = document.createElement("div");
        line.className = "sample-line";
        line.dataset.features = "true";
        line.style.setProperty("--sample-features", features);
        line.textContent = text;
        return line;
      }

      function renderCards() {
        grid.innerHTML = "";
        const sharedText = sampleTextInput.value.trim() || "I J IJ JAZZ JACKPOT";

        for (const card of featureCards) {
          const article = document.createElement("article");
          article.className = "card";

          const header = document.createElement("div");
          header.className = "card-header";

          const title = document.createElement("h2");
          title.textContent = card.title;

          const tag = document.createElement("div");
          tag.className = "tag";
          tag.textContent = card.tag;

          header.append(title, tag);

          const note = document.createElement("p");
          note.className = "feature-meta";
          note.textContent = card.note;

          const specimen = document.createElement("div");
          specimen.className = "specimen";

          const featureSample = document.createElement("div");
          featureSample.className = "sample";

          const featureLabel = document.createElement("span");
          featureLabel.className = "sample-label";
          featureLabel.textContent = card.features === "normal"
            ? "Feature sample"
            : `Feature sample: ${card.features}`;

          featureSample.append(featureLabel);
          featureSample.append(
            createSampleLine(card.text || sharedText, card.features),
          );

          const compareSample = document.createElement("div");
          compareSample.className = "sample stack";

          const compareLabel = document.createElement("span");
          compareLabel.className = "sample-label";
          compareLabel.textContent = "Default vs feature";

          const defaultLine = createSampleLine(card.text || sharedText, "normal");
          const activeLine = createSampleLine(card.text || sharedText, card.features);
          compareSample.append(compareLabel, defaultLine, activeLine);

          specimen.append(featureSample, compareSample);
          article.append(header, note, specimen);
          grid.append(article);
        }
      }

      function syncControls() {
        document.documentElement.style.setProperty(
          "--sample-size",
          `${sampleSizeInput.value}px`,
        );
        document.documentElement.style.setProperty(
          "--sample-tracking",
          `${Number(trackingInput.value) / 1000}em`,
        );
      }

      sampleSizeInput.addEventListener("input", () => {
        syncControls();
      });

      trackingInput.addEventListener("input", () => {
        syncControls();
      });

      sampleTextInput.addEventListener("input", () => {
        renderCards();
      });

      syncControls();
      renderCards();
    </script>
  </body>
</html>
